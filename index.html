<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Number Generators</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#0f1e35;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}
.container{
    background:#182b4a;
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:420px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.generator{
    margin:25px 0;
}
button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2e5cff;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#1c45d9;
}
.result{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
    <h2>Random Number Generators</h2>

    <div class="generator">
        <p>Range: <b>-35 to -15</b></p>
        <button onclick="generateRange1()">Generate</button>
        <div class="result" id="result1">—</div>
    </div>

    <div class="generator">
        <p>Range: <b>-10 to 25</b></p>
        <button onclick="generateRange2()">Generate</button>
        <div class="result" id="result2">—</div>
    </div>
</div>

<script>
function generateRange1(){
    const num = Math.floor(Math.random() * 21) - 35;
    document.getElementById("result1").innerText = num;
}

function generateRange2(){
    const num = Math.floor(Math.random() * 36) - 10;
    document.getElementById("result2").innerText = num;
}
</script>
</body>
</html>
